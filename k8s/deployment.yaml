apiVersion: apps/v1
kind: Deployment
metadata:
  name: telco-rule-engine
  labels:
    app: telco-rule-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: telco-rule-engine
  template:
    metadata:
      labels:
        app: telco-rule-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: telco-rule-engine
          image: telco-rule-engine:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: telco-rule-engine
spec:
  selector:
    app: telco-rule-engine
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP

